<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://www.paypal.com/sdk/js?client-id=Af-4KVY4AE22SiF5zqj6pDSfUpE_9QUtayqaNjHg8ht4o1uZsu_V5DA7sD3s_BdwQu-caKQkg9i8G26C&currency=USD&components=buttons&enable-funding=card"></script>
<meta charset="UTF-8">
</head>
<body>
<h2>Enter Amount to Pay</h2>
<input type="number" id="amount" min="1" step="1.0" style="transform: scale(0.8); transform-origin: top left;">
<br>
<div id="paypal-button-container" style="transform: scale(0.8); transform-origin: top left;"></div>
<script>
paypal.Buttons({
  createOrder: function(data, actions) {
	let amount = document.getElementById("amount").value;
	if (!amount || amount <= 0) {
	  alert("Please enter a valid amount.");
	  return;
	}
	return actions.order.create({
	  purchase_units: [{
		amount: {
		  value: parseFloat(amount).toFixed(2)
		}
	  }]
	});
  },
  onApprove: function(data, actions) {
	return actions.order.capture().then(function(details) {
	  alert("Payment completed successfully!");
	});
  },
  onError: function(err) {
	console.error(err);
	alert("An error occurred.");
  }
}).render('#paypal-button-container');
</script>
</body>
</html>
