<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get a Free Appointment</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen;
}

body {
  background: #0b0f1a;
  color: #fff;
  overflow-x: hidden;
}

/* LAYOUT */
.container {
  display: flex;
  min-height: 100vh;
}

/* IMAGE SIDE */
.image-section {
  flex: 1;
  position: relative;
}

.image-section img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* overlay for premium look */
.image-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to right,
    rgba(11,15,26,0.8),
    rgba(11,15,26,0.2)
  );
}

/* CONTENT SIDE */
.content-section {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px;
}

.content {
  max-width: 420px;
}

/* TYPOGRAPHY */
h1 {
  font-size: 2.8rem;
  line-height: 1.2;
  margin-bottom: 20px;
}

.highlight {
  color: #6366f1;
}

p {
  font-size: 1.05rem;
  color: #9ca3af;
  margin-bottom: 30px;
}

/* FORM */
form {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 8px;
  border: none;
  font-size: 1rem;
}

button {
  padding: 14px 18px;
  border-radius: 8px;
  border: none;
  background: #6366f1;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s ease;
}

button:hover {
  background: #4f46e5;
  transform: translateY(-1px);
}

/* TRUST TEXT */
.note {
  font-size: 0.8rem;
  color: #6b7280;
}

/* MOBILE */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
  }

  .image-section {
    height: 45vh;
  }

  .content-section {
    padding: 30px;
  }

  h1 {
    font-size: 2rem;
  }

  form {
    flex-direction: column;
  }

  button {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- IMAGE -->
  <div class="image-section">
    <img src="Rain_Vortex_Night_Jewel_Changi_Feb23_R16_06856.jpg.webp" alt="Wikimedia Commons Photo of the Day">
    <div class="image-overlay"></div>
  </div>

  <!-- CONTENT -->
  <div class="content-section">
    <div class="content">
      
      <h1>
        Get Your <span class="highlight">Free Appointment by Email</span> Today
      </h1>

      <p>
        Join thousands getting exclusive deals, insider updates, and special promotions—straight to your inbox.
      </p>

      <form action="https://formspree.io/f/xvzdrwkg" method="POST">
        <input type="email" name="email" placeholder="Enter your email" required>
        <button type="submit">Get Free Appointment</button>
      </form>

      <div class="note">
        No spam. Unsubscribe anytime.
      </div>

    </div>
  </div>

</div>

</body>
</html>
